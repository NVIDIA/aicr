# Gang scheduling test with PyTorchJob and KAI scheduler
# Requires: Kubeflow Training Operator (PyTorchJob CRD), KAI scheduler
# Usage: kubectl apply -f tests/manifests/gang-scheduling-test.yaml
---
apiVersion: v1
kind: Namespace
metadata:
  name: gang-scheduling-test
---
apiVersion: kubeflow.org/v1
kind: PyTorchJob
metadata:
  name: pytorch-dist-mnist-nccl
  namespace: gang-scheduling-test
  labels:
    kai.scheduler/queue: nccl-test
spec:
  pytorchReplicaSpecs:
    Master:
      replicas: 1
      template:
        spec:
          schedulerName: kai-scheduler
          tolerations:
            - operator: Exists
          containers:
            - name: pytorch
              image: ghcr.io/kubeflow/training-v1/pytorch-dist-mnist:latest
              command:
                - python
                - /opt/pytorch-mnist/mnist.py
                - --backend=nccl
              resources:
                limits:
                  nvidia.com/gpu: 1
    Worker:
      replicas: 1
      template:
        spec:
          schedulerName: kai-scheduler
          tolerations:
            - operator: Exists
          containers:
            - name: pytorch
              image: ghcr.io/kubeflow/training-v1/pytorch-dist-mnist:latest
              command:
                - python
                - /opt/pytorch-mnist/mnist.py
                - --backend=nccl
              resources:
                limits:
                  nvidia.com/gpu: 1
