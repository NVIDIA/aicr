name: 'Setup Flox Environment'
description: 'Install Flox with Nix caching. Use .github/actions/flox-run to run commands.'

inputs:
  flox-version:
    description: 'Flox version to install'
    required: false
    default: '1.8.3'
  magic-nix-cache-version:
    description: 'Magic Nix Cache version to install'
    required: false
    default: '0.1.6'

runs:
  using: 'composite'
  steps:
    - name: Cache Flox and Magic Nix Cache binaries
      uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684  # v4.2.3
      id: binary-cache
      with:
        path: |
          /tmp/flox.deb
          /tmp/magic-nix-cache
        key: flox-${{ inputs.flox-version }}-mnc-${{ inputs.magic-nix-cache-version }}

    - name: Download binaries
      if: steps.binary-cache.outputs.cache-hit != 'true'
      shell: bash
      env:
        FLOX_VERSION: ${{ inputs.flox-version }}
        MNC_VERSION: ${{ inputs.magic-nix-cache-version }}
      run: |
        curl -fsSL "https://downloads.flox.dev/by-env/stable/deb/flox-${FLOX_VERSION}.x86_64-linux.deb" -o /tmp/flox.deb
        # Binary is XZ compressed - download and decompress
        curl -fsSL "https://github.com/DeterminateSystems/magic-nix-cache/releases/download/v${MNC_VERSION}/magic-nix-cache-X64-Linux" \
          | xz -d > /tmp/magic-nix-cache

    - name: Install Flox
      shell: bash
      run: |
        chmod +x /tmp/magic-nix-cache
        sudo dpkg -i /tmp/flox.deb

        # Disable telemetry
        mkdir -p ~/.config/flox
        echo 'disable_metrics = true' > ~/.config/flox/flox.toml

    - name: Configure Nix and start cache daemon
      shell: bash
      run: |
        # Configure all Nix settings at once
        sudo tee -a /etc/nix/nix.conf > /dev/null << 'EOF'
        require-sigs = false
        extra-substituters = http://127.0.0.1:37515
        extra-trusted-substituters = http://127.0.0.1:37515
        EOF

        # Start the cache daemon in background
        STARTUP_FILE="/tmp/magic-nix-cache-startup"
        /tmp/magic-nix-cache \
          --listen "127.0.0.1:37515" \
          --upstream "https://cache.nixos.org" \
          --diagnostic-endpoint "" \
          --use-gha-cache Enabled \
          --startup-notification-file "$STARTUP_FILE" \
          > /tmp/magic-nix-cache.log 2>&1 &
        echo $! > /tmp/magic-nix-cache.pid

        # Single restart to pick up all config changes
        sudo systemctl restart nix-daemon

        # Wait for cache daemon to be ready (max 30s)
        for i in {1..30}; do
          if [ -f "$STARTUP_FILE" ]; then
            echo "Magic Nix Cache daemon is ready"
            break
          fi
          sleep 1
        done

        if [ ! -f "$STARTUP_FILE" ]; then
          echo "Warning: Magic Nix Cache daemon startup timed out"
          cat /tmp/magic-nix-cache.log || true
        fi

    - name: Verify Flox environment
      shell: bash
      run: |
        flox --version
        flox activate -- bash -c 'env | grep FLOX && flox list'
