name: On Tag Release
on:
  push:
    tags:
    - 'v[0-9]+.[0-9]+.[0-9]+'  # Only build tag with semantic versioning format

permissions:
  attestations: write
  contents: write
  id-token: write
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      IDENTITY_PROVIDER: 'projects/116689922666/locations/global/workloadIdentityPools/github-pool/providers/github-provider'
      PROJECT_ID: 'eidosx'
      SERVICE_ACCOUNT: 'github-actions-user'
      RUN_REGION: 'us-west1'
      RUN_SERVICE: 'api'
      RUN_IMAGE_REG: 'us-docker.pkg.dev/eidosx/ghcr/eidosd'
    steps:

      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Setup Flox
        uses: ./.github/actions/setup-flox

      - name: Cache Go modules and build
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684  # v4.2.3
        with:
          path: |
            .flox/cache/go
            .flox/cache/go-build
          key: go-${{ runner.os }}-${{ hashFiles('go.sum') }}
          restore-keys: |
            go-${{ runner.os }}-

      - name: Tidy Modules
        uses: ./.github/actions/flox-run
        with:
          command: make tidy

      - name: Run Tests
        uses: ./.github/actions/flox-run
        with:
          command: CGO_ENABLED=1 make test

      - name: Lint Go
        uses: ./.github/actions/flox-run
        with:
          command: golangci-lint run --timeout=5m

      - name: Ensure License Headers
        uses: ./.github/actions/flox-run
        with:
          command: make license

      # Build and Release
      - name: Authenticate to registry
        uses: ./.github/actions/ghcr-login
        with:
          registry: ghcr.io

      - name: Build and Release
        id: release
        uses: ./.github/actions/flox-run
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          command: make release

      - name: Attest eidosd image
        uses: ./.github/actions/attest-image-from-tag
        with:
          image_name: ghcr.io/${{ github.repository_owner }}/eidosd
          tag: ${{ github.ref_name }}

      - name: Attest eidos image
        uses: ./.github/actions/attest-image-from-tag
        with:
          image_name: ghcr.io/${{ github.repository_owner }}/eidos
          tag: ${{ github.ref_name }}

      # Deploy to Cloud Run
      - name: Deploy API to Cloud Run
        if: steps.release.outcome == 'success'
        uses: ./.github/actions/cloud-run-deploy
        with:
          project_id: ${{ env.PROJECT_ID }}
          workload_identity_provider: ${{ env.IDENTITY_PROVIDER }}
          service_account: "${{ env.SERVICE_ACCOUNT }}@${{ env.PROJECT_ID }}.iam.gserviceaccount.com"
          region: ${{ env.RUN_REGION }}
          service: ${{ env.RUN_SERVICE }}
          image: "${{ env.RUN_IMAGE_REG }}/eidosd:${{ github.ref_name }}"
