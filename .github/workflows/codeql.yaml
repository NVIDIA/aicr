# CodeQL Security Analysis
#
# Runs GitHub's semantic code analysis to find security vulnerabilities.
# Schedule: On push to main, on PRs to main, and weekly (Monday 5am UTC).
# Weekly runs catch newly discovered vulnerability patterns.
#
# Reference: https://codeql.github.com/docs/

name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly scan on Monday at 5am UTC
    # Catches newly discovered vulnerability patterns
    - cron: '0 5 * * 1'

permissions:
  # Required for actions/checkout and local actions to read repository contents
  contents: read
  # Required for accessing workflow metadata
  actions: read
  # Required for CodeQL to upload results to GitHub Security tab
  security-events: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Load tool versions
        uses: ./.github/actions/load-versions
        id: versions

      - name: Setup Go
        uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5  # v6.2.0
        with:
          go-version: ${{ steps.versions.outputs.go }}

      - name: Initialize CodeQL
        uses: github/codeql-action/init@b20883b0cd1f46c72ae0ba6d1090936928f9fa30  # v4.32.0
        with:
          languages: go
          # Manual build mode for Go projects with custom build steps
          build-mode: manual

      - name: Build
        run: go build ./...

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@b20883b0cd1f46c72ae0ba6d1090936928f9fa30  # v4.32.0
        with:
          category: "/language:go"
