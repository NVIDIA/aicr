# CodeQL Security Analysis
#
# Runs GitHub's semantic code analysis to find security vulnerabilities.
# Schedule: On push to main, on PRs to main, and weekly (Monday 5am UTC).
# Weekly runs catch newly discovered vulnerability patterns.
#
# Reference: https://codeql.github.com/docs/

name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly scan on Monday at 5am UTC
    # Catches newly discovered vulnerability patterns
    - cron: '0 5 * * 1'

permissions:
  # Required to checkout the repository
  contents: read
  # Required for CodeQL to upload results to GitHub Security tab
  security-events: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Load tool versions
      uses: ./.github/actions/load-versions
      id: versions

    - name: Setup Go
      uses: actions/setup-go@v6
      with:
        go-version: ${{ steps.versions.outputs.go }}

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v3
      with:
        languages: go
        # Manual build mode for Go projects with custom build steps
        build-mode: manual

    - name: Build
      run: make build

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v3
      with:
        category: "/language:go"
