# ResourceQuota for nvidia-dra-driver-gpu on GKE COS GB200 (A4X)
# Ref: https://docs.cloud.google.com/ai-hypercomputer/docs/create/gke-ai-hypercompute-custom-a4x
#
# The DRA namespace requires a ResourceQuota for system-critical priority pods.
# Default of 37 pods covers 18 A4X nodes (2x node count + 1).
# Override via: --set nvidia-dra-driver-gpu.podQuota=<value>
{{- $dra := index .Values "nvidia-dra-driver-gpu" }}
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: nvidia-dra-driver-gpu-quota
  namespace: {{ .Release.Namespace }}
spec:
  hard:
    pods: "{{ $dra.podQuota | default 37 }}"
  scopeSelector:
    matchExpressions:
      - operator: In
        scopeName: PriorityClass
        values:
          - system-node-critical
          - system-cluster-critical
